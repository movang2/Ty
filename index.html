        /* ===== TOOLTIP STYLES ===== */
.tooltip-box {
    position: fixed;
    background: #2c3e50;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 14px;
    max-width: 350px;
    word-wrap: break-word;
    z-index: 10000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    pointer-events: none;
    animation: tooltipFadeIn 0.2s ease;
    border-left: 4px solid #3498db;
    line-height: 1.5;
}

.tooltip-box::before {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 0 8px 8px 8px;
    border-style: solid;
    border-color: transparent transparent #2c3e50 transparent;
}

.tooltip-box.bottom::before {
    top: auto;
    bottom: -8px;
    border-width: 8px 8px 0 8px;
    border-color: #2c3e50 transparent transparent transparent;
}

.tooltip-box .tooltip-word {
    font-weight: bold;
    color: #ffd700;
    margin-right: 8px;
    font-size: 1.1em;
}

.tooltip-box .tooltip-meaning {
    color: #ecf0f1;
}

.tooltip-box .tooltip-source {
    font-size: 11px;
    color: #95a5a6;
    margin-top: 6px;
    padding-top: 4px;
    border-top: 1px dashed #7f8c8d;
    font-style: italic;
}

@keyframes tooltipFadeIn {
    from {
        opacity: 0;
        transform: translateY(5px);
   }
    to {
        opacity: 1;
        transform: translateY(0);
   }
}

<body>

    <div class="container">
        <input type="text" id="video-url" placeholder="Nhập link YouTube (ví dụ: https://www.youtube.com/watch?v=dQw4w9WgXcQ)">
        <button onclick="loadVideo()">Tải Video</button>
        <div id="subtitle-link-container" style="display:none;">
            <a id="subtitle-link" target="_blank">Tải phụ đề từ subtitle.to</a>
        </div>
        <br>
        <input type="file" id="subtitle-file" accept=".srt">
        <button onclick="loadSubtitles()">Tải Phụ đề</button>

        <br>
        <div class="control-buttons">
            <button onclick="startReading()">Bắt đầu Đọc</button>
            <button onclick="stopReading()">Dừng TTS</button>
            <button class="rewind-btn" onclick="rewindSubtitle()">Lùi 5 giây</button>
            <button class="test-tts-btn" onclick="testTTS()">Kiểm tra TTS</button>
            <button class="repeat-btn" onclick="toggleRepeat()">Lặp Phụ đề (Bật/Tắt)</button>
            <button onclick="saveState()">Lưu Trạng Thái</button>
            <button class="translate-srt-btn" onclick="translateSRT()">Dịch Phụ đề</button>
        </div>
        <input type="file" id="state-file" accept=".json">
        <button onclick="loadState()">Tải Trạng Thái</button>
        <div id="tts-speed-container">
            <label for="tts-speed">Tốc độ TTS: </label>
            <input type="range" id="tts-speed" min="0.5" max="2.5" step="0.1" value="1.5" onchange="updateTTSSpeed(this.value)">
            <span id="speed-value">1.5</span>

        <div id="tts-language-container">

        </div>
        <div style="margin-top:10px; display: flex; align-items: center; justify-content: center; gap: 5px;">
            <label for="subtitle-offset">Lệch thời gian phụ đề (giây): </label>
            <button onclick="toggleNegativeOffset()">-</button>
            <input type="number" id="subtitle-offset" min="-5" max="5" step="0.1" value="0" style="width: 70px; text-align: center;" onchange="updateSubtitleOffset(this.value)">
            <span id="offset-value">0.0</span>
            <button onclick="applyOffsetToSubtitles()">Áp dụng lệch vĩnh viễn</button>
        </div>
        <div class="volume-container">
            <div class="volume-control">

        <div style="margin-top: 20px; border: 1px solid #ccc; padding: 10px;">

    <div id="video-container">

    <div id="subtitle-display"></div>

    <div style="margin-top: 20px;">

    <h3>Danh sách từ vựng đã tra</h3>
    <h3>Danh sách từ NotebookLM</h3>
    <textarea id="notebooklm-vocab" rows="10" placeholder="Dán danh sách từ ở đây..."></textarea>
    
                    <div style="margin-top: 10px; display: flex; align-items: center; gap: 5px;">
                        <input type="text" id="chars-to-remove" placeholder="Nhập ký tự cần xóa (ví dụ: *>)">
                        <button onclick="removeCharacters()">Xóa ký tự</button>
                    </div>
                    <button onclick="linkVocabToSubtitles()">Liên kết từ vựng với phụ đề</button>
                    <script>
                        function removeCharacters() {
                            const textArea = document.getElementById("notebooklm-vocab");
                            const charsToRemove = document.getElementById("chars-to-remove").value;
                            if (textArea && charsToRemove) {
                                let content = textArea.value;
                                for (let i = 0; i < charsToRemove.length; i++) {
                                    const char = charsToRemove[i];
                                    content = content.split(char).join("");
                               }
                                textArea.value = content;
                           }
                       }
                    </script>
                
    <div id="linked-vocab-list"></div>
    <div style="margin-top: 10px;">
        <button id="vocab-tts-toggle" onclick="toggleVocabTTSMode()">Chế độ đọc từ vựng (Tắt)</button>
        <button id="start-vocab-tts" onclick="startVocabTTS()" disabled>Bắt đầu đọc từ vựng</button>
        <button id="pause-vocab-tts" onclick="pauseVocabTTS()" disabled>Tạm dừng</button>
        <button id="stop-vocab-tts" onclick="stopVocabTTS()" disabled>Dừng hẳn</button>
    </div>
    <div style="margin-bottom: 10px;">
        <label>
            <input type="checkbox" id="naver-lookup-toggle" onchange="toggleNaverLookup(this.checked)">
            Bật tra từ trên Naver
        </label>
    </div>
    <div id="vocab-list"></div>
    <h3>Phụ đề yêu thích</h3>
    <button onclick="clearAllFavorites()">Xóa tất cả phụ đề yêu thích</button>
    <div id="favorite-subtitles"></div>

    <script>
        let youtubePlayer;
        let subtitleData = [];
        let currentSubtitleIndex = -1;
        let isSpeaking = false;
        let ttsSpeed = 1.5;
        let ttsLanguage = "vi-VN";
        let history = [];
        let currentVideoUrl = "";
        let vocabList = [];
        let instantLookupEnabled = true;
        let naverLookupEnabled = false;
        let ttsVolume = 1.0;
        let syncInterval;
        let lastSpokenText = "";
        let lastSpokenTime = 0;
        let lastCheckedTime = 0;
        let isManualSeeking = false;
        let isRepeating = false;
        let repeatCount = 0;
        const maxRepeatCount = 3;
        let subtitleOffset = 0;
        let currentVideoFavorites = [];
        let vocabTTSMode = false;
        let vocabTTSIndex = -1;
        let vocabTTSTimeout;
        let isVocabTTSPaused = false;
        let pausedVocabIndex = -1;
        let vocabDisplayMode = false;

        function findBestSubtitleIndex(vocabWord) {
            const cleanVocab = vocabWord.replace(/[^\p{Script=Hangul}]+/gu, "").trim().substring(0, 2);
            if (cleanVocab.length < 2) return -1;
            
            for (let i = 0; i < subtitleData.length; i++) {
                const subtitleText = subtitleData[i].koreanText;
                const wordsInSubtitle = subtitleText.split(/\s+/);
                for (let word of wordsInSubtitle) {
                    const cleanWord = word.replace(/[^\p{Script=Hangul}]+/gu, "").trim();
                    if (cleanWord.length >= 2 && cleanWord.substring(0, 2) === cleanVocab) {
                        return i;
                   }
               }
           }
            return -1;
       }

        function linkVocabToSubtitles() {
            const vocabText = document.getElementById("notebooklm-vocab").value;
            const vocabArray = vocabText
                .split("\n")
                .map(v => {
                    const match = v.match(/[\p{Script=Hangul}]+(?:\s+[\p{Script=Hangul}]+)*/gu);
                    const korean = match ? match[0].trim() : "";
                    const meaningMatch = v.split(":").slice(1).join(":").trim();
                    const meaning = meaningMatch ? meaningMatch : "";
                    return korean ? { korean, meaning} : null;
               })
                .filter(v => v);
            const container = document.getElementById("linked-vocab-list");
            container.innerHTML = "";

            vocabArray.forEach(word => {
                const div = document.createElement("div");
                div.textContent = `${word.korean} ${word.meaning ? `- ${word.meaning}` : ""}`;
                div.className = "clickable-vocab";

                div.onclick = () => {
                    const matchIndex = findBestSubtitleIndex(word.korean);
                    if (matchIndex !== -1) {
                        youtubePlayer.seekTo(subtitleData[matchIndex].startTime, true);
                        youtubePlayer.playVideo();
                        highlightSubtitle(matchIndex);
                        if (vocabTTSMode) {
                            readTextDual(`${word.korean} - ${word.meaning}`);
                       }
                   } else {
                        alert("Không tìm thấy từ gần giống trong phụ đề");
                   }
               };
                container.appendChild(div);
           });
            saveToHistory(currentVideoUrl, null, vocabText);
       }

        function checkManualSeek() {
            if (!youtubePlayer) return;
            const currentTime = youtubePlayer.getCurrentTime();
            const timeDiff = Math.abs(currentTime - lastCheckedTime);
            if (timeDiff > 1 && timeDiff < 10) {
                isManualSeeking = true;
                handleManualSeek(currentTime);
           }
            lastCheckedTime = currentTime;
       }

        function handleManualSeek(currentTime) {
            if (!subtitleData.length) return;
            let newIndex = -1;
            for (let i = 0; i < subtitleData.length; i++) {
                if (subtitleData[i].startTime <= currentTime) {
                    newIndex = i;
               } else {
                    break;
               }
           }
            if (newIndex >= 0 && newIndex !== currentSubtitleIndex) {
                currentSubtitleIndex = newIndex;
                updateSubtitleDisplay(newIndex);
                if (isSpeaking) {
                    const textToRead = ttsLanguage === "vi-VN" ? subtitleData[newIndex].vietnameseText : subtitleData[newIndex].koreanText;
                    speechSynthesis.cancel();
                    readText(textToRead, () => { isSpeaking = false;});
               }
           }
            isManualSeeking = false;
       }

        function waitForPlayer() {
            return new Promise((resolve, reject) => {
                const startTime = Date.now();
                const checkPlayer = () => {
                    if (youtubePlayer && youtubePlayer.seekTo && youtubePlayer.setVolume) {
                        resolve();
                   } else if (Date.now() - startTime > 10000) {
                        reject(new Error("YouTube player failed to initialize"));
                   } else {
                        setTimeout(checkPlayer, 100);
                   }
               };
                checkPlayer();
           });
       }

        function waitForVoices() {
            return new Promise((resolve) => {
                if (speechSynthesis.getVoices().length > 0) {
                    resolve();
               } else {
                    speechSynthesis.onvoiceschanged = () => {
                        speechSynthesis.onvoiceschanged = null;
                        resolve();
                   };
               }
           });
       }

        function loadVideo() {
            const urlInput = document.getElementById("video-url").value;
            const videoId = extractVideoId(urlInput);
            if (!videoId) {
                alert("URL không hợp lệ! Vui lòng nhập link dạng https://www.youtube.com/watch?v=dQw4w9WgXcQ");
                return;
           }
            currentVideoUrl = urlInput;
            const iframe = document.getElementById("youtube-video");
            iframe.src = `https://www.youtube.com/embed/${videoId}?enablejsapi=1`;
            const subtitleLinkContainer = document.getElementById("subtitle-link-container");
            const subtitleLink = document.getElementById("subtitle-link");
            // Chuyển đổi URL live sang định dạng watch?v=
let convertedUrl = urlInput;
if (urlInput.includes('youtube.com/live/')) {
    // Trích xuất video ID từ URL live
    const liveMatch = urlInput.match(/youtube\.com\/live\/([^?&]+)/);
    if (liveMatch && liveMatch[1]) {
        const videoId = liveMatch[1].split('?')[0]; // Lấy phần ID, bỏ query params
        convertedUrl = `https://www.youtube.com/watch?v=${videoId}`;
    }
}

subtitleLink.href = `https://getsubs.cc/${convertedUrl}`;
subtitleLink.textContent = `Tải phụ đề từ getsubs.cc cho video này${urlInput.includes('youtube.com/live/') ? ' (đã chuyển đổi từ live)' : ''}`;
            subtitleLink.textContent = `Tải phụ đề từ getsubs.cc cho video này`;
            subtitleLinkContainer.style.display = "block";
            initializePlayer();
            const historyItem = history.find(item => item.videoUrl === urlInput);
            vocabList = historyItem && historyItem.vocabList ? historyItem.vocabList.slice() : [];
            currentVideoFavorites = historyItem && historyItem.favoriteSubtitles ? historyItem.favoriteSubtitles.slice() : [];
            document.getElementById("notebooklm-vocab").value = historyItem && historyItem.notebooklmVocab ? historyItem.notebooklmVocab : "";
            saveToHistory(urlInput, null, document.getElementById("notebooklm-vocab").value);
            displayVocabList();
            displayFavorites();
            instantLookupEnabled = localStorage.getItem("instantLookup") === "1";
            document.getElementById("instant-lookup-toggle").checked = instantLookupEnabled;
       }

        async function loadAutoSubtitles() {
            alert("Đang thử tải phụ đề tự động từ subtitle.to...");
            try {
                const response = await new Promise(resolve => {

        function extractVideoId(url) {
    // Xử lý nhiều định dạng URL YouTube khác nhau
    const patterns = [
        /(?:youtube\.com\/watch\?v=)([^&]+)/,
        /(?:youtube\.com\/embed\/)([^?]+)/,
        /(?:youtube\.com\/v\/)([^?]+)/,
        /(?:youtu\.be\/)([^?]+)/,
        /(?:youtube\.com\/live\/)([^?]+)/  // Thêm pattern cho live stream
    ];
    
    for (let pattern of patterns) {
        const match = url.match(pattern);
        if (match) return match[1];
    }
    
    return null;
}

        function parseSRT(srtContent) {
            const subtitleBlocks = srtContent.trim().split(/\n\s*\n/);
            return subtitleBlocks.map(block => {
                const lines = block.split("\n");
                if (lines.length < 3) return null;

                const timing = lines[1].split(" --> ");
                const startTimeParts = timing[0].split(/[:,]/);
                const endTimeParts = timing[1].split(/[:,]/);
                const startTime = parseInt(startTimeParts[0]) * 3600 + parseInt(startTimeParts[1]) * 60 + parseFloat(`${startTimeParts[2]}. ${startTimeParts[3] || '0'}`);
                const endTime = parseInt(endTimeParts[0]) * 3600 + parseInt(endTimeParts[1]) * 60 + parseFloat(`${endTimeParts[2]}. ${endTimeParts[3] || '0'}`);

                if (lines.length === 3) {
                    const koreanText = lines[2].trim();
                    return { 
                        startTime: isNaN(startTime) ? 0 : startTime,
                        endTime: isNaN(endTime) ? startTime + 2 : endTime,
                        fullText: koreanText, 
                        koreanText, 
                        vietnameseText: ""
                   };
               } else {
                    const koreanText = lines[2].trim();
                    const vietnameseText = lines[3].trim();
                    return { 
                        startTime: isNaN(startTime) ? 0 : startTime,
                        endTime: isNaN(endTime) ? startTime + 2 : endTime,
                        fullText: `${koreanText} ${vietnameseText}`, 
                        koreanText, 
                        vietnameseText 
                   };
               }
           }).filter(item => item && typeof item.startTime === 'number' && item.koreanText);
       }

           }

                alert("Lỗi khi dịch phụ đề: " + error.message);

        async function translateText(text) {
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=vi&dt=t&q=${encodeURIComponent(text)}`;
                const res = await fetch(url);
                const data = await res.json();
                return data[0].map(x => x[0]).join('');
           } catch (e) {
                console.error("Lỗi dịch Google:", e);
                return "[Lỗi dịch]";
           }
       }

        function convertToSRT(subtitles) {
            let srtContent = "";
            subtitles.forEach((sub, index) => {
                const startTime = formatTimeForSRT(sub.startTime);
                const endTime = formatTimeForSRT(sub.endTime || sub.startTime + 2);
                
                srtContent += `${index + 1}\n`;
                srtContent += `${startTime} --> ${endTime}\n`;
                srtContent += `${sub.koreanText}\n`;
                srtContent += `${sub.vietnameseText || ''}\n\n`;
           });
            return srtContent;
       }

        function formatTimeForSRT(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            const ms = Math.floor((seconds % 1) * 1000);
            
            return `${h.toString().padStart(2, '0')}: ${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}, ${ms.toString().padStart(3, '0')}`;
       }

        function lookupWord(word) {
            // Luôn thêm từ vào danh sách từ vựng nếu chưa có
            const existingVocab = vocabList.find(item => item.word === word);
            if (!existingVocab) {
                vocabList.push({ word, meaning: "Đang tra cứu..."});
                saveVocabToHistory();
                displayVocabList();
           }

            // Tìm trong NotebookLM
            const notebookVocab = getNotebookVocabInfo(word);
            
            if (vocabDisplayMode) {
                displayVocabInfo(word, existingVocab || vocabList.find(item => item.word === word), notebookVocab);
           } else if (instantLookupEnabled) {
                openNaverDict(word);
                if (!existingVocab) {
                    fetchGoogleTranslate(word);
               }
           } else {
                // Khi cả hai chế độ đều tắt, vẫn hiển thị thông tin cơ bản
                displayVocabInfo(word, existingVocab || vocabList.find(item => item.word === word), notebookVocab);
           }
       }

        function getNotebookVocabInfo(word) {
    const notebookText = document.getElementById("notebooklm-vocab").value;
    if (!notebookText.trim()) return null;
    
    const lines = notebookText.split('\n');
    for (const line of lines) {
        // Tìm dòng có chứa từ khóa
        if (line.includes(word)) {
            const parts = line.split(':');
            if (parts.length >= 2) {
                return {
                    korean: parts[0].trim(),
                    meaning: parts.slice(1).join(':').trim()
               };
           } else {
                // Nếu không có dấu :, coi toàn bộ là từ
                return {
                    korean: line.trim(),
                    meaning: ''
               };
           }
       }
   }
    return null;
}

        function displayVocabInfo(word, existingVocab, notebookVocab) {
            const container = document.getElementById("vocab-info-display");
            let html = `<div class="vocab-info-item">`;
            
            html += `<div><span class="vocab-info-korean">${word}</span>`;
            
            if (existingVocab?.meaning) {
                html += `<span class="vocab-info-meaning">${existingVocab.meaning}</span>`;
           }
            html += `</div>`;
            
            if (notebookVocab?.meaning && (!existingVocab || notebookVocab.meaning !== existingVocab.meaning)) {
                html += `<div class="vocab-info-notebook">📔 NotebookLM: ${notebookVocab.meaning}</div>`;
           }
            
            const appearances = findWordAppearances(word);
            if (appearances.length > 0) {
                html += `<div style="margin-top:10px;font-size:0.9em;color:#555;">`;
                html += `<div>🕒 Xuất hiện trong video:</div>`;
                appearances.forEach((time, idx) => {
                    html += `<div style="margin-top:4px;">
                        <span class="vocab-info-time">${formatTime(time.startTime)}</span>
                        <button onclick="jumpToSubtitle(${time.subtitleIndex})">Xem</button>
                    </div>`;
               });
                html += `</div>`;
           }
            
            html += `</div>`;
            container.innerHTML = html;
       }

        function findWordAppearances(word) {
            const result = [];
            const cleanWord = word.replace(/[^\p{Script=Hangul}]+/gu, "").trim();
            if (!cleanWord || !subtitleData.length) return result;
            
            subtitleData.forEach((sub, idx) => {
                if (sub.koreanText.includes(cleanWord)) {
                    result.push({
                        startTime: sub.startTime,
                        subtitleIndex: idx
                   });
               }
           });
            
            return result;
       }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600).toString().padStart(2, "0");
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, "0");
            const s = Math.floor(seconds % 60).toString().padStart(2, "0");
            return `${h}: ${m}:${s}`;
       }

        function startReading() {
            if (!youtubePlayer || subtitleData.length === 0) {
                alert("Vui lòng tải video và phụ đề trước!");

        function syncSubtitles() {
            if (!youtubePlayer || youtubePlayer.getPlayerState() !== YT.PlayerState.PLAYING) {
                return;
           }
            const currentTime = youtubePlayer.getCurrentTime() + subtitleOffset;
            let nextSubtitle = null;
            let nextIndex = -1;
            for (let i = 0; i < subtitleData.length; i++) {
                if (subtitleData[i].startTime <= currentTime) {
                    nextSubtitle = subtitleData[i];
                    nextIndex = i;
               } else {
                    break;
               }
           }
            if (nextSubtitle && nextIndex !== currentSubtitleIndex) {
                currentSubtitleIndex = nextIndex;
                updateSubtitleDisplay(currentSubtitleIndex);
                const textToRead = ttsLanguage === "vi-VN" ? nextSubtitle.vietnameseText : nextSubtitle.koreanText;
                const currentTimeMs = Date.now();
                if (textToRead !== lastSpokenText || (currentTimeMs - lastSpokenTime) > 1000) {
                    speechSynthesis.cancel();
                    isSpeaking = true;
                    readText(textToRead, () => {
                        isSpeaking = false;
                        if (isRepeating && repeatCount < maxRepeatCount) {
                            repeatCount++;
                            youtubePlayer.seekTo(nextSubtitle.startTime, true);
                       } else {
                            repeatCount = 0;
                       }
                   });
                    lastSpokenText = textToRead;
                    lastSpokenTime = currentTimeMs;
               }
           }
       }

        function updateSubtitleDisplay(index) {
            const startIndex = Math.max(0, index - 2);
            const endIndex = Math.min(subtitleData.length - 1, index + 2);
            let subtitleContent = "";
            const notebookVocab = document.getElementById("notebooklm-vocab").value
                .split("\n")
                .filter(line => line.trim())
                .map(line => line.split(":")[0]?.trim())
                .filter(korean => korean);

            for (let i = startIndex; i <= endIndex; i++) {
                const sub = subtitleData[i];
                const highlightedKoreanText = sub.koreanText.split(/\s+/).map(word => {
                    const cleanWord = word.replace(/[^\p{Script=Hangul}]+/gu, "").trim();
                    const isNotebookVocab = notebookVocab.some(v => v.includes(cleanWord) || cleanWord.includes(v));
                    
                    if (isNotebookVocab) {
                        return `<span class="korean-word learned" onclick="handleWordClick('${cleanWord}')" 
                                style="font-weight:bold;background-color:#e3f2fd;padding:2px 4px;border-radius:3px;border-bottom:2px solid #2196F3;">
                                ${word}</span>`;
                   }
                    return `<span class="korean-word" onclick="handleWordClick('${cleanWord}')"> ${word}</span>`;
               }).join(" ");
                const isCurrent = i === index ? "current" : "";
                subtitleContent += `<div class="subtitle-line ${isCurrent}"> ${formatTime(sub.startTime)}: ${highlightedKoreanText} <span class="vietnamese"> ${sub.vietnameseText}</span> </div>`;
           }
            document.getElementById("subtitle-display").innerHTML = subtitleContent;
            highlightSubtitle(index);
       }

        function readText(text, callback) {
            if (!text) {
                callback?.();
                return;
           }
            try {
                if (typeof speechSynthesis === 'undefined' || !speechSynthesis) {
                    console.error("Trình duyệt không hỗ trợ Web Speech API");
                    alert("Trình duyệt của bạn không hỗ trợ chức năng đọc văn bản (TTS).");
                    callback?.();
                    return;
               }
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = ttsLanguage;
                utterance.rate = ttsSpeed;
                utterance.volume = ttsVolume;
                const voices = speechSynthesis.getVoices();
                if (!voices || voices.length === 0) {
                    console.error("Không tìm thấy giọng đọc nào");
                    alert("Không tìm thấy giọng đọc phù hợp. Vui lòng kiểm tra cài đặt ngôn ngữ trên thiết bị.");
                    callback?.();
                    return;
               }
                const preferredVoice = voices.find(voice => voice.lang === ttsLanguage);
                if (preferredVoice) {
                    utterance.voice = preferredVoice;
               } else {
                    console.warn("Không tìm thấy giọng đọc phù hợp với ngôn ngữ", ttsLanguage);
               }
                utterance.onend = () => {
                    callback?.();
               };
                utterance.onerror = (event) => {
                    console.error("Lỗi TTS:", event);
                    callback?.();
               };
                speechSynthesis.speak(utterance);
           } catch (error) {
                console.error("Lỗi khi đọc văn bản:", error);
                callback?.();
           }
       }

        function removeBracketsContent(text) {
            return text.replace(/\[[^\]]*\]/g, '').trim();
       }

        function readTextDual(text, callback) {
            const cleanedText = removeBracketsContent(text);
            const parts = cleanedText.split("-");
            const koreanPart = parts[0] ? parts[0].trim() : "";
            const vietnamesePart = parts[1] ? parts[1].trim() : "";

            if (koreanPart) {
                const koUtterance = new SpeechSynthesisUtterance(koreanPart);
                koUtterance.lang = "ko-KR";
                koUtterance.rate = ttsSpeed;
                koUtterance.volume = ttsVolume;

                koUtterance.onend = () => {
                    if (vietnamesePart) {
                        const viUtterance = new SpeechSynthesisUtterance(vietnamesePart);
                        viUtterance.lang = "vi-VN";
                        viUtterance.rate = ttsSpeed;
                        viUtterance.volume = ttsVolume;
                        viUtterance.onend = callback;
                        speechSynthesis.speak(viUtterance);
                   } else if (callback) {
                        callback();
                   }
               };
                speechSynthesis.speak(koUtterance);
           } else if (vietnamesePart) {
                const viUtterance = new SpeechSynthesisUtterance(vietnamesePart);
                viUtterance.lang = "vi-VN";
                viUtterance.rate = ttsSpeed;
                viUtterance.volume = ttsVolume;
                viUtterance.onend = callback;
                speechSynthesis.speak(viUtterance);
           } else if (callback) {
                callback();
           }
       }

        function stopReading() {
            if (typeof speechSynthesis !== "undefined") {
                speechSynthesis.cancel();
                isSpeaking = false;
           }
            if (syncInterval) {
                clearInterval(syncInterval);
                syncInterval = null;
           }
            isRepeating = false;
            repeatCount = 0;
       }

        function toggleRepeat() {
            isRepeating = !isRepeating;
            alert(isRepeating ? "Đã bật chế độ lặp phụ đề (3 lần)" : "Đã tắt chế độ lặp phụ đề");

        function rewindSubtitle() {

                alert("Vui lòng tải video và phụ đề trước!");
                return;
           }
            const currentTime = youtubePlayer.getCurrentTime();
            const rewindTime = Math.max(0, currentTime - 5);
            let newIndex = -1;
            for (let i = subtitleData.length - 1; i >= 0; i--) {
                if (subtitleData[i].startTime <= rewindTime) {
                    newIndex = i;
                    break;
               }
           }
            if (newIndex >= 0) {
                youtubePlayer.seekTo(rewindTime, true);
                currentSubtitleIndex = newIndex - 1;
                updateSubtitleDisplay(newIndex);
                if (youtubePlayer.getPlayerState() !== YT.PlayerState.PLAYING) {
                    youtubePlayer.playVideo();
               }
           }

// ===== TOOLTIP FUNCTIONALITY =====
let activeTooltip = null;
let tooltipTimeout = null;

function showTooltip(word, meaning, source, x, y) {
    // Xóa tooltip cũ nếu có
    if (activeTooltip) {
        activeTooltip.remove();
   }
    
    // Xóa timeout cũ
    if (tooltipTimeout) {
        clearTimeout(tooltipTimeout);
   }
    
    // Tạo tooltip mới
    const tooltip = document.createElement('div');
    tooltip.className = 'tooltip-box';
    
    // Xác định vị trí (trên hay dưới)
    const viewportHeight = window.innerHeight;
    const position = y > viewportHeight / 2 ? 'top' : 'bottom';
    if (position === 'bottom') {
        tooltip.classList.add('bottom');
   }
    
    // Xác định nguồn thông tin
    let sourceText = '';
    if (source === 'notebook') {
        sourceText = '📔 Từ NotebookLM';
   } else if (source === 'google') {
        sourceText = '🌐 Google Dịch';
   } else if (source === 'manual') {
        sourceText = '📝 Từ do bạn nhập';
   }
    
    tooltip.innerHTML = `
        <span class="tooltip-word">${word}</span>
        <span class="tooltip-meaning">${meaning}</span>
        ${sourceText ? `<div class="tooltip-source"> ${sourceText}</div>` : ''}
    `;
    
    document.body.appendChild(tooltip);
    activeTooltip = tooltip;
    
    // Đặt vị trí tooltip
    const tooltipWidth = tooltip.offsetWidth;
    let left = x - tooltipWidth / 2;
    left = Math.max(10, Math.min(left, window.innerWidth - tooltipWidth - 10));
    
    let top;
    if (position === 'bottom') {
        top = y + 20; // Hiện bên dưới con trỏ
   } else {
        top = y - tooltip.offsetHeight - 20; // Hiện bên trên con trỏ
   }
    
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
    
    // Tự động ẩn sau 4 giây
    tooltipTimeout = setTimeout(() => {
        if (activeTooltip) {
            activeTooltip.style.animation = 'tooltipFadeIn 0.2s ease reverse';
            setTimeout(() => {
                if (activeTooltip) {
                    activeTooltip.remove();
                    activeTooltip = null;
               }
           }, 200);
       }
   }, 4000);
}

// Ghi đè hàm lookupWord để sử dụng tooltip
const originalLookupWord = window.lookupWord;
window.lookupWord = function(word) {
    // Luôn thêm từ vào danh sách từ vựng nếu chưa có
    const existingVocab = vocabList.find(item => item.word === word);
    if (!existingVocab) {
        vocabList.push({ word, meaning: "Đang tra cứu..."});
        saveVocabToHistory();
        displayVocabList();
   }

    // Tìm trong NotebookLM
    const notebookVocab = getNotebookVocabInfo(word);
    
    // Kiểm tra chế độ
    const naverLookupEnabled = document.getElementById('naver-lookup-toggle').checked;
    
    if (naverLookupEnabled) {
        // Nếu bật Naver, mở tab mới
        openNaverDict(word);
        if (!existingVocab) {
            fetchGoogleTranslate(word);
       }
   } else {
        // Nếu tắt Naver, hiển thị tooltip
        const event = window.event;
        const mouseX = event ? event.clientX : window.innerWidth / 2;
        const mouseY = event ? event.clientY : window.innerHeight / 2;
        
        if (notebookVocab) {
            // Có trong NotebookLM
            showTooltip(word, notebookVocab.meaning, 'notebook', mouseX, mouseY);
       } else if (existingVocab && existingVocab.meaning && existingVocab.meaning !== "Đang tra cứu...") {
            // Có trong từ điển đã lưu
            showTooltip(word, existingVocab.meaning, 'manual', mouseX, mouseY);
            
            // Dịch thêm nếu chưa có nghĩa
            if (!existingVocab.meaning || existingVocab.meaning === "Đang tra cứu...") {
                fetchGoogleTranslate(word);
           }
       } else {
            // Chưa có nghĩa, hiển thị loading và dịch
            showTooltip(word, "Đang tra cứu...", '', mouseX, mouseY);
            
            // Dịch qua Google
            fetchGoogleTranslate(word).then(() => {
                // Cập nhật tooltip sau khi dịch xong
                const updatedVocab = vocabList.find(item => item.word === word);
                if (updatedVocab && updatedVocab.meaning && updatedVocab.meaning !== "Đang tra cứu...") {
                    if (activeTooltip) {
                        activeTooltip.remove();
                        activeTooltip = null;
                   }
                    showTooltip(word, updatedVocab.meaning, 'google', mouseX, mouseY);
               }
           });
       }
   }
    
    // Vẫn hiển thị thông tin chi tiết ở panel dưới
    displayVocabInfo(word, existingVocab || vocabList.find(item => item.word === word), notebookVocab);
};

// Cập nhật hàm fetchGoogleTranslate để trả về Promise
window.fetchGoogleTranslate = async function(text) {
    try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=vi&dt=t&q=${encodeURIComponent(text)}`;
        const res = await fetch(url);
        const data = await res.json();
        const translated = data[0].map(x => x[0]).join('');
        
        const index = vocabList.findIndex(item => item.word === text);
        if (index !== -1) {
            vocabList[index].meaning = translated;
            saveVocabToHistory();
            displayVocabList();
            updateSubtitleDisplay(currentSubtitleIndex);
       } else {
            vocabList.push({ word: text, meaning: translated});
            saveVocabToHistory();
            displayVocabList();
       }
        
        return translated;
   } catch (e) {
        console.error("Lỗi dịch Google:", e);
        return null;
   }
};

// Thêm event listener để đóng tooltip khi click ra ngoài

        activeTooltip.remove();

});

document.addEventListener('keydown', function(e) {

        activeTooltip.remove();
        activeTooltip = null;
        if (tooltipTimeout) {
            clearTimeout(tooltipTimeout);
       }
   }
});

// Cập nhật hàm toggleNaverLookup để thông báo
const originalToggleNaver = window.toggleNaverLookup;
window.toggleNaverLookup = function(enabled) {
    originalToggleNaver(enabled);
    const mode = enabled ? '🌐 Mở Naver Dictionary' : '💬 Hiển thị tooltip thông minh';
    alert(`Đã chuyển sang chế độ: ${mode}\n ${enabled ? 'Click vào từ sẽ mở tab Naver mới' : 'Click vào từ sẽ hiện tooltip nghĩa ngay tại chỗ'}`);
};

function checkAutoVocabDisplay(currentTime){

        }
    }
    // If not found → DO NOTHING (keep old vocab visible)
}

// Attach to video timeupdate
document.addEventListener("DOMContentLoaded", function(){
    const video = document.querySelector("video");
    if(!video) return;

    video.addEventListener("timeupdate", function(){
        checkAutoVocabDisplay(video.currentTime);
    });
});
</script>


    <!-- Nút Reset Dữ Liệu - Được thêm tự động -->
    <div style="text-align: center; margin: 20px 0;">
        <button onclick="resetToDefault()" style="padding: 12px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: 500; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3); transition: all 0.3s ease;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
            🔄 Reset Tất Cả Dữ Liệu
        </button>
    </div>

    <script>
    function resetToDefault() {
        if(confirm('⚠️ Bạn có chắc muốn reset toàn bộ dữ liệu về trạng thái ban đầu? Hành động này không thể hoàn tác!')) {
            
            // 1. Reset tất cả input fields
            document.querySelectorAll('input, textarea, select').forEach(element => {
                if(element.type === 'text' || element.type === 'textarea' || element.type === 'email' || 
                   element.type === 'password' || element.type === 'number' || element.type === 'search' ||
                   element.type === 'tel' || element.type === 'url') {
                    element.value = '';
                } else if(element.type === 'checkbox' || element.type === 'radio') {
                    element.checked = false;
                } else if(element.tagName === 'SELECT') {
                    element.selectedIndex = 0;
                }
            });
            
            // 2. Reset tất cả dữ liệu trong localStorage
            localStorage.clear();
            
            // 3. Reset tất cả dữ liệu trong sessionStorage
            sessionStorage.clear();
            
            // 4. Reset form nếu có
            const forms = document.getElementsByTagName('form');
            for(let form of forms) {
                form.reset();
            }
            
            // 5. Xóa tất cả cookies
            document.cookie.split(";").forEach(function(c) { 
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
            });
            
            // 6. Reset nội dung của các element có contenteditable
            document.querySelectorAll('[contenteditable="true"]').forEach(element => {
                element.innerHTML = '';
            });
            
            // 7. Reset giá trị của range inputs
            document.querySelectorAll('input[type="range"]').forEach(element => {
                element.value = element.defaultValue;
            });
            
            // 8. Reset tất cả radio groups
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                if(radio.defaultChecked) {
                    radio.checked = true;
                } else {
                    radio.checked = false;
                }
            });
            
            // Thông báo thành công
            alert('✅ Đã reset toàn bộ dữ liệu thành công!');
            
            // Tùy chọn: reload trang
            // location.reload();
        }
    }
    </script>

        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    
    /* Animation khi click */
    .reset-btn:active {
        transform: translateY(0);
        box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
    }
